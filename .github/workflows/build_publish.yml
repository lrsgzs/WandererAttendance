name: Build & Publish Multi-Platform

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布标签（例如 1.0.0.0）"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build_desktop:
    name: Build_Desktop_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.build_type }}
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-24.04' || (matrix.os == 'macos' && 'macos-15' || 'windows-2022') }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows, linux, macos]
        arch: [x64, x86, arm64]
        build_type: [full, selfContained]
        exclude:
          - os: linux
            arch: x86
          - os: macos
            arch: x86
          - os: linux
            build_type: full
          - os: macos
            build_type: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        shell: pwsh
        env:
          RID: ${{ matrix.os == 'windows' && format('win-{0}', matrix.arch) || (matrix.os == 'linux' && format('linux-{0}', matrix.arch) || format('osx-{0}', matrix.arch)) }}
        run: dotnet restore WandererAttendance.Desktop/WandererAttendance.Desktop.csproj -r $env:RID

      - name: Publish Desktop
        shell: pwsh
        env:
          RID: ${{ matrix.os == 'windows' && format('win-{0}', matrix.arch) || (matrix.os == 'linux' && format('linux-{0}', matrix.arch) || format('osx-{0}', matrix.arch)) }}
          SELF_CONTAINED: ${{ matrix.build_type == 'selfContained' }}
          MODE: ${{ matrix.build_type == 'selfContained' && 'sc' || 'fdd' }}
        run: |
          $outDir = "dist/desktop/$env:RID-$env:MODE"
          dotnet publish WandererAttendance.Desktop/WandererAttendance.Desktop.csproj `
            -c Release `
            -r $env:RID `
            --self-contained $env:SELF_CONTAINED `
            -p:PublishTrimmed=false `
            -p:UseAppHost=true `
            --no-restore `
            -o $outDir

      - name: Pack Desktop
        shell: pwsh
        env:
          RID: ${{ matrix.os == 'windows' && format('win-{0}', matrix.arch) || (matrix.os == 'linux' && format('linux-{0}', matrix.arch) || format('osx-{0}', matrix.arch)) }}
          MODE: ${{ matrix.build_type == 'selfContained' && 'sc' || 'fdd' }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $source = "dist/desktop/$env:RID-$env:MODE/*"
          $target = "dist/WandererAttendance_desktop_$env:RID`_$env:MODE.zip"
          Compress-Archive -Path $source -DestinationPath $target -Force

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.build_type }}
          path: dist/WandererAttendance_desktop_*.zip

  build_android:
    name: Build_Android_apk
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore
        run: dotnet restore WandererAttendance.Android/WandererAttendance.Android.csproj

      - name: Publish Android
        run: |
          dotnet publish WandererAttendance.Android/WandererAttendance.Android.csproj \
            -c Release \
            -f net9.0-android35.0 \
            -p:AndroidPackageFormat=apk \
            --no-restore \
            -o dist/android

      - name: Collect APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path dist/android -Recurse -Filter *.apk | Select-Object -First 1
          if (-not $apk) { throw "No APK found in dist/android" }
          Copy-Item $apk.FullName dist/WandererAttendance_android.apk -Force

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android_apk
          path: dist/WandererAttendance_android.apk

  publish:
    name: Publish_Release
    runs-on: windows-2022
    needs: [build_desktop, build_android]
    if: ${{ always() && success('build_desktop') && success('build_android') && github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    concurrency:
      group: publish-public
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./out_artifacts

      - name: Combine Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ./out -Force | Out-Null
          Get-ChildItem ./out_artifacts -Recurse -File -Include *.zip,*.apk | ForEach-Object {
            Copy-Item $_.FullName ./out -Force
          }
          Write-Host "Combined files:"
          Get-ChildItem ./out -File | Select-Object Name, Length

      - name: Generate Release Note
        env:
          tagName: ${{ github.event.inputs.release_tag }}
        run: pwsh -ep bypass ./scripts/gen-release-note.ps1

      - name: Upload APP to release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*.zip,./out/*.apk"
          draft: true
          bodyFile: ./release-note.md
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.inputs.release_tag }}
